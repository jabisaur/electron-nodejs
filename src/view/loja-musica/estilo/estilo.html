<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estilos | Empire Records</title>
    <link rel="stylesheet" href="../../../../node_modules/bootstrap/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="../../css/breadcrumb.css">
    <link rel="stylesheet" href="../css/modal.css">
</head>
<body>
    <header>
        <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
            <div class="container-fluid">
                <a class="navbar-brand" href="../index.html">
                    <i class="bi bi-disc"></i> Empire Records
                </a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNav">
                    <ul class="navbar-nav me-auto">
                        <li class="nav-item">
                            <a class="nav-link" href="../index.html">Home</a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link" href="../cadastro/cadastro.html">Cadastro</a>
                        </li>
                    </ul>
                </div>
            </div>
        </nav>
    </header>

    <main class="container mt-4">
        <!-- Breadcrumb -->
        <div class="breadcrumb-container">
            <nav aria-label="breadcrumb">
                <ol class="breadcrumb">
                    <li class="breadcrumb-item">
                        <a href="../index.html"><i class="bi bi-house-door"></i> Home</a>
                    </li>
                    <li class="breadcrumb-item">
                        <a href="../cadastro/cadastro.html">Cadastro</a>
                    </li>
                    <li class="breadcrumb-item active" aria-current="page">
                        <i class="bi bi-music-note-beamed"></i> Estilos Musicais
                    </li>
                </ol>
            </nav>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h1>🎵 Gerenciar Estilos Musicais</h1>
            <a href="../cadastro/cadastro.html" class="btn btn-outline-secondary">
                <i class="bi bi-arrow-left"></i> Voltar ao Cadastro
            </a>
        </div>

        <!-- Formulário de cadastro -->
        <div class="card mb-4">
            <div class="card-header bg-primary text-white">
                <h2 class="h5 mb-0"><i class="bi bi-plus-circle"></i> Cadastrar Novo Estilo</h2>
            </div>
            <div class="card-body">
                <form id="form-estilo">
                    <div class="mb-3">
                        <label for="descricao" class="form-label">Nome do Estilo</label>
                        <input type="text" class="form-control" id="descricao" name="descricao" 
                               placeholder="Digite o nome do estilo" autofocus required>
                    </div>
                    <button type="submit" class="btn btn-primary">
                        <i class="bi bi-save"></i> Salvar
                    </button>
                </form>
            </div>
        </div>

        <!-- Lista de estilos -->
        <div class="card">
            <div class="card-header bg-dark text-white">
                <h2 class="h5 mb-0"><i class="bi bi-list"></i> Estilos Cadastrados</h2>
            </div>
            <div class="card-body">
                <table class="table table-striped table-hover" id="lista-estilos">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Descrição</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tbody-estilos">
                        <tr>
                            <td colspan="3" class="text-center">
                                <div class="spinner-border text-primary" role="status">
                                    <span class="visually-hidden">Carregando...</span>
                                </div>
                                <br>Carregando estilos...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </main>

    <!-- Modal de Edição -->
    <div id="edicaoEstiloModal" class="modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="edicaoTitulo">Editar Estilo</h3>
                <button class="close-btn" onclick="fecharModalEdicao()">&times;</button>
            </div>
            <div class="modal-body">
                <p id="edicaoMensagem"></p>
            
                <div class="valor-atual-info">
                    <strong>Nome atual:</strong>
                    <span id="valorAtualTexto"></span>
                </div>
            
                <div class="form-group">
                    <label for="edicaoInput">Novo nome:</label>
                    <input 
                        type="text" 
                        id="edicaoInput" 
                        class="edicao-input"
                        placeholder="Digite o novo nome do estilo..."
                    />
                </div>
            </div>
            <div class="modal-footer">
                <button id="edicaoBtnCancelar" class="btn-cancelar">Cancelar</button>
                <button id="edicaoBtnConfirmar" class="btn-confirmar">Salvar</button>
            </div>
        </div>
    </div>

    <script src="../../../../node_modules/bootstrap/dist/js/bootstrap.bundle.min.js"></script>
    <script src="rendererEstilo.js"></script>
</body>
</html>
